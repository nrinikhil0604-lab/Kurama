name: Auto Create Version File

on:
  release:
    types: [published] # यह तब चलेगा जब आप गिटहब पर नया Release पब्लिश करेंगे

jobs:
  create-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update version.txt locally
        run: |
          # यह आपके रिलीज़ टैग (जैसे 1.0, 1.1) को लेकर version.txt में लिख देगा
          echo "${{ github.event.release.tag_name }}" > version.txt

      - name: Commit version.txt to main branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.txt
          git commit -m "Auto-update version.txt from Release Tag [skip ci]" || exit 0
          git push origin main
